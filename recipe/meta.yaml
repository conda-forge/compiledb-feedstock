{% set name = "compiledb" %}
{% set version = "0.10.7" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 97752d8810b6977654a11a22cdc41bf6b71473bcdb5da312bc135f36d6af8271

build:
  number: 0
  noarch: python
  entry_points:
    - compiledb=compiledb.cli:cli
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - bashlex
    - click
    - python >={{ python_min }}
    - shutilwhich

test:
  imports:
    - compiledb
    - compiledb.commands
  commands:
    - pip check
    - compiledb --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/nickdiego/compiledb
  summary: Tool for generating Clang JSON Compilation Database files for make-based build systems.
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - marcelotrevisani
